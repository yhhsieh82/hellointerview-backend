spring:
  profiles:
    active: local

  application:
    name: hellointerview-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hellointerview}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8000

logging:
  level:
    com.hellointerview.backend: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

ai:
  llm:
    provider: ${LLM_PROVIDER:stub}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3.1:8b}
      connect-timeout: ${OLLAMA_CONNECT_TIMEOUT:2s}
      read-timeout: ${OLLAMA_READ_TIMEOUT:60s}
      max-attempts: ${OLLAMA_MAX_ATTEMPTS:2}
      initial-backoff: ${OLLAMA_INITIAL_BACKOFF:500ms}
      backoff-multiplier: ${OLLAMA_BACKOFF_MULTIPLIER:2.0}
      max-jitter-millis: ${OLLAMA_MAX_JITTER_MILLIS:250}
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      connect-timeout: ${GEMINI_CONNECT_TIMEOUT:2s}
      read-timeout: ${GEMINI_READ_TIMEOUT:60s}
      max-attempts: ${GEMINI_MAX_ATTEMPTS:2}
      initial-backoff: ${GEMINI_INITIAL_BACKOFF:500ms}
      backoff-multiplier: ${GEMINI_BACKOFF_MULTIPLIER:2.0}
      # The design uses the ${VAR:default} syntax so that:
      #   - If an environment variable GEMINI_MAX_JITTER_MILLIS is set, it overrides all config.
      #   - If not, Spring uses the value from application.yml (profile-based config if present).
      #   - If neither is set, the default value 250 is used.
      max-jitter-millis: ${GEMINI_MAX_JITTER_MILLIS:250}
